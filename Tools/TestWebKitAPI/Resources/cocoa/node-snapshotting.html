<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body, html {
                width: 100%;
                height: 100%;
                font-family: system-ui;
            }

            h2 {
                background: black;
                color: white;
                padding: 1em;
                display: inline-block;
            }

            div.red-box {
                width: 100px;
                height: 100px;
                background: red;
            }

            div.translated-box {
                width: 100px;
                height: 100px;
                background: blue;
                transform: translate(150px, 30px);
            }

            div.rotated-box {
                width: 100px;
                height: 100px;
                background: lime;
                transform: rotate(45deg);
            }
            
            .transformed {
                position: absolute;
                padding: 20px;
                border: 1px solid black;
                transform: translate(120px, 30px) rotate(20deg) scale(1.5);
            }
            
            .child-box {
                width: 100px;
                height: 100px;
                background: cyan;
            }
        </style>
    </head>
    <body>
        <h2>This is some text</h2>
        <br>
        <img src="icon.png" />
        <div class="red-box"></div>
        <div class="translated-box"></div>
        <div class="rotated-box"></div>
        <div class="transformed">
            <div class="child-box"></div>
        </div>
    </body>
</html>
