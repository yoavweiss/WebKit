<!DOCTYPE html> <!-- webkit-test-runner [ UnifyDamagedRegions=false ] -->
<html lang="en">
  <head>
    <link rel="stylesheet" href="./common.css">
    <style>
      .layer {
          position: absolute;
          will-change: transform;
          width: 100px;
          height: 100px;
          background-color: green;
      }
      .parent {
          opacity: 0.8;
      }
      .child {
          top: 50px;
          left: 50px;
      }
    </style>
  </head>
  <body>
    <div class="layer parent">
      parent
      <div class="layer child">
        child
      </div>
    </div>
    <script src="./common.js"></script>
    <script>
      setupTestCase({disableConsoleLog: true});

      processAnimationFrameSequence({skipFirstFrameToEnsureInitialPaintingDone: true}, [
          () => {
              document.querySelector('.parent').style.backgroundColor = 'blue';
          },
          () => {
              var damage = latestFrameDamage();
              assertRectsEq(damage.rects, [[0, 0, 100, 100]]);
          },
      ], 0);
    </script>
  </body>
</html>
