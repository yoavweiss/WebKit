<!DOCTYPE html> <!-- webkit-test-runner [ LayerBasedSVGEngineEnabled=true ] -->
<html>
<head>
<style>
    html, body { margin: 0; padding: 0; }
    svg { width: 200px; height: 200px; }
    .anchor { transform: translateZ(0); }
</style>
</head>
<body>
<!-- Offset-and-scaled viewBox (50 50 100 100) with a plain rect between two composited anchors. Paint order must stay red, green, blue. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 50 100 100">
    <g class="anchor"><rect x="55" y="55" width="40" height="40" fill="red"/></g>
    <rect x="75" y="75" width="40" height="40" fill="green"/>
    <g class="anchor"><rect x="95" y="95" width="40" height="40" fill="blue"/></g>
</svg>
</body>
</html>
