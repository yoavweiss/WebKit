    </g>
    <rect x="100" y="100" width="100" height="100" fill="purple"/>
    <g filter="url(#f)">
        <rect x="130" y="130" width="100" height="100" fill="blue"/>
    </g>

        <filter id="f" x="-10%" y="-10%" width="120%" height="120%">
            <feOffset dx="0" dy="0"/>
        </filter>
    </defs>
