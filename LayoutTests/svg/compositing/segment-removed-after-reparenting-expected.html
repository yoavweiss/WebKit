<!DOCTYPE html>
<html>
<head>
<style>
    html, body { margin: 0; padding: 0; }
    svg { width: 200px; height: 200px; }
</style>
</head>
<body>
<!-- Reference for the re-parented scene, no compositing. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <g>
        <g><rect x="10" y="10" width="60" height="60" fill="red"/></g>
        <g><rect x="70" y="70" width="60" height="60" fill="blue"/></g>
    </g>
    <g transform="translate(0 100)"><rect x="40" y="40" width="60" height="60" fill="green"/></g>
</svg>
</body>
</html>
