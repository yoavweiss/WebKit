<!DOCTYPE html> <!-- webkit-test-runner [ LayerBasedSVGEngineEnabled=true ] -->
<html>
<head>
<style>
    html, body { margin: 0; padding: 0; }
    svg { width: 200px; height: 200px; }
    .anchor { transform: translateZ(0); }
</style>
</head>
<body>
<!-- Plain rect between two composited anchors inside a will-change <g>. Paint order must stay red, green, blue. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <g style="will-change: transform">
        <g class="anchor"><rect x="20" y="20" width="60" height="60" fill="red"/></g>
        <rect x="50" y="50" width="60" height="60" fill="green"/>
        <g class="anchor"><rect x="80" y="80" width="60" height="60" fill="blue"/></g>
    </g>
</svg>
</body>
</html>
