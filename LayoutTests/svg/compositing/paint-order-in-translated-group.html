<!DOCTYPE html> <!-- webkit-test-runner [ LayerBasedSVGEngineEnabled=true ] -->
<html>
<head>
<style>
    html, body { margin: 0; padding: 0; }
    svg { width: 200px; height: 200px; }
    .anchor { transform: translateZ(0); }
</style>
</head>
<body>
<!-- Plain rect between two composited anchors inside a <g transform="translate(40,40)">. Green must paint between red and blue in DOM order. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <g transform="translate(40,40)">
        <g class="anchor"><rect x="5" y="5" width="60" height="60" fill="red"/></g>
        <rect x="35" y="35" width="60" height="60" fill="green"/>
        <g class="anchor"><rect x="65" y="65" width="60" height="60" fill="blue"/></g>
    </g>
</svg>
</body>
</html>
