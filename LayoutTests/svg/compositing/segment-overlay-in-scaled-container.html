<!DOCTYPE html> <!-- webkit-test-runner [ LayerBasedSVGEngineEnabled=true ] -->
<html>
<head>
<style>
    html, body { margin: 0; padding: 0; }
    svg { width: 240px; height: 240px; }
    .anchor { will-change: transform; }
</style>
</head>
<body>
<!-- Plain rect between two composited anchors in an opacity <g> with a CSS scale, painting in DOM order. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
    <g style="opacity: 0.8; transform: scale(1.5); transform-origin: 0 0">
        <rect class="anchor" x="10" y="10" width="40" height="40" fill="red"/>
        <rect x="60" y="60" width="40" height="40" fill="orange"/>
        <rect class="anchor" x="110" y="110" width="40" height="40" fill="blue"/>
    </g>
</svg>
</body>
</html>
