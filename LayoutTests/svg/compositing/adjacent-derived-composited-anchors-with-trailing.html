<!DOCTYPE html> <!-- webkit-test-runner [ LayerBasedSVGEngineEnabled=true ] -->
<html>
<head>
<style>
    html, body { margin: 0; padding: 0; }
    svg { width: 200px; height: 200px; }
</style>
</head>
<body>
<!-- Two adjacent composited anchor <g>s followed by a plain trailing rect. Green, orange and purple must all paint. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <g style="z-index: 1">
        <rect style="transform: translateZ(0)" x="10" y="10" width="50" height="50" fill="red"/>
        <rect x="10" y="70" width="50" height="50" fill="green"/>
    </g>
    <g style="z-index: 2">
        <rect style="transform: translateZ(0)" x="70" y="10" width="50" height="50" fill="blue"/>
        <rect x="70" y="70" width="50" height="50" fill="orange"/>
    </g>
    <rect x="130" y="130" width="50" height="50" fill="purple"/>
</svg>
</body>
</html>
