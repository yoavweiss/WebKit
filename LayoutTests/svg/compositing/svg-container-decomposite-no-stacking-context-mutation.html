<!DOCTYPE html> <!-- webkit-test-runner [ LayerBasedSVGEngineEnabled=true ] -->
<html>
<head>
<style>
    html, body { margin: 0; padding: 0; }
    svg { width: 200px; height: 200px; }
</style>
</head>
<body>
<!-- A composited will-change <g> that decomposites at runtime. The green square renders the same before and after, guarding against a debug assertion when an SVG container loses its backing. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <g id="g" style="will-change: transform">
        <rect x="50" y="50" width="100" height="100" fill="green"/>
    </g>
</svg>
<script>
    if (window.testRunner)
        testRunner.waitUntilDone();
    requestAnimationFrame(() => requestAnimationFrame(() => {
        document.getElementById("g").style.willChange = "auto";
        requestAnimationFrame(() => requestAnimationFrame(() => {
            if (window.testRunner)
                testRunner.notifyDone();
        }));
    }));
</script>
</body>
</html>
