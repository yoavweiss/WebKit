<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
    <!-- Reference: the same filtered group with no compositing. The filter blurs all three rects uniformly. -->
    <filter id="f" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6"/></filter>
    <g filter="url(#f)">
        <rect x="20" y="60" width="80" height="80" fill="red"/>
        <rect x="110" y="60" width="80" height="80" fill="green"/>
        <rect x="200" y="60" width="80" height="80" fill="blue"/>
    </g>
</svg>
