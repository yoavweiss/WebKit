<!DOCTYPE html>
<html>
<head>
<script src="../../resources/js-test.js"></script>
</head>
<body>
    <svg width="100" height="200">
        <image id="gif" opacity="1" width="100" height="100"></image>
        <use href="#gif" transform="translate(0, 100)"></use>
    </svg>
    <script>
        description("Animated GIF in SVG image referenced by use element should keep animating when presentation attributes are rapidly changed.");

        function drawFrame(image, frame) {
            return new Promise((resolve) => {
                document.body.offsetHeight;
                testRunner.display();

                image.addEventListener("webkitImageFrameReady", function listener() {
                    image.removeEventListener("webkitImageFrameReady", listener, true);
                    resolve(frame + 1);
                }, true);
            });
        }

        function drawImage(image, frameCount) {
            let promise = drawFrame(image, 0);
            for (let i = 1; i < frameCount; ++i) {
                promise = promise.then((frame) => {
                    return drawFrame(image, frame);
                });
            }
            return promise;
        }

        function loadAndDrawImage(image, href, frameCount) {
            return new Promise((resolve) => {
                image.onload = (() => {
                    drawImage(image, frameCount).then(resolve);
                });
                image.href.baseVal = href;
            });
        }

        window.jsTestIsAsync = true;

        if (window.internals) {
            internals.clearMemoryCache();
            internals.settings.setWebkitImageReadyEventEnabled(true);
            internals.settings.setAnimatedImageAsyncDecodingEnabled(true);
        }

        var image = document.getElementById("gif");

        var opacity = 1;
        var intervalID = setInterval(function() {
            opacity = opacity + 0.005;
            image.setAttribute("opacity", opacity + "");
        }, 20);

        loadAndDrawImage(image, "resources/animated-gif-for-use-test.gif", 10).then(() => {
            debug("All frames of the animated image were drawn in order.");
            clearInterval(intervalID);
            finishJSTest();
        });
    </script>
</body>
</html>
