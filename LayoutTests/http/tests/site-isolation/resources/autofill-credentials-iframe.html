<!DOCTYPE html>
<html>
<body>
<input id="user" type="email" autocomplete="username" autocapitalize="none" style="display: block; width: 200px; font-size: 16px;">
<input id="password" type="password" autocomplete="current-password" style="display: block; width: 200px; font-size: 16px;">
<script>
window.addEventListener("message", (event) => {
    if (event.data.type === "getInputRect") {
        const rect = document.getElementById("user").getBoundingClientRect();
        window.parent.postMessage({
            type: "inputRect",
            x: rect.x + rect.width / 2,
            y: rect.y + rect.height / 2
        }, "*");
    } else if (event.data.type === "getCredentials") {
        window.parent.postMessage({
            type: "credentials",
            username: document.getElementById("user").value,
            password: document.getElementById("password").value
        }, "*");
    }
});
</script>
</body>
</html>
