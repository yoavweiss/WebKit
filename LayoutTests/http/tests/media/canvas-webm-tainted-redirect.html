    description("Ensure that a canvas is tainted by a WebM video obtained via redirect to a different origin when CORS is not enabled.");

    {
        testDataRetrievalForbidden("redirected WebM video");
        finishJSTest();

    video.src = "/resources/redirect.py?url=" + encodeURIComponent("http://localhost:8000/media/resources/serve_video.py.webm?type=video/webm&name=../media-source/webm/test.webm");

    window.jsTestIsAsync = true;
