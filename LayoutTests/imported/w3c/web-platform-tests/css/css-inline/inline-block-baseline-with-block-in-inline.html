<!DOCTYPE html>
<title>CSS Inline: inline-block baseline is bottom margin edge when content is block-in-inline only</title>
<link rel="help" href="https://drafts.csswg.org/css-inline-3/#baseline-synthesis-box">
<link rel="help" href="https://www.w3.org/TR/CSS2/visudet.html#leading">
<link rel="match" href="inline-block-baseline-with-block-in-inline-ref.html">
<link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
<meta name="assert" content="An inline-block whose only content is a block inside an inline (block-in-inline) synthesizes its baseline at the bottom margin edge per CSS Inline 3 atomic inline baseline synthesis rules.">
<style>
.test { font: 20px/1 Ahem; color: green; }
.ib { display: inline-block; width: 60px; height: 60px; background: green; }
.inner { display: block; width: 60px; height: 60px; background: green; }
</style>
<p>Test passes if there is one solid green rectangle with a green "X" baseline-aligned to its bottom edge.</p>
<div class="test"><span><div class="ib"><span><div class="inner"></div></span></div>X</span></div>
