<!DOCTYPE html>
<html>
<head>
<style>
.container {
  width: 500px;
}
.outer-flex {
  display: flex;
}
.inner-flex {
  display: flex;
  width: 400px;
}
.flex-item {
  width: 300px;
}
.scroller {
  overflow-x: scroll;
  white-space: pre;
}
.sibling {
  width: 100px;
  height: 100px;
  border: 4px solid blue;
}
</style>
</head>
<body>
<div class=container>
  <div class=outer-flex>
    <div class=inner-flex>
      <div class=flex-item>
        <div class=scroller>PASS if always-on scrollbar does not overlap the blue box below</div>
      </div>
    </div>
  </div>
  <div class=sibling></div>
</div>
</body>
</html>
