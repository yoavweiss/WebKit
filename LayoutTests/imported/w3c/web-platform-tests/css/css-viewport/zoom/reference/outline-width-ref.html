<!DOCTYPE html>
<html>
<head>
<style>
.group {
  border: solid black 1px;
  padding: 20px;
  margin: 10px;
  width: max-content;
}
.outer {
  display: inline-block;
  outline-style: solid;
  outline-width: 5px;
  outline-color: transparent;
}
.container {
  display: inline-block;
  width: 200px;
  height: 100px;
  outline-style: solid;
}
.container-zoomed {
  display: inline-block;
  width: 400px;
  height: 200px;
  outline-style: solid;
}
.spacer {
  display: inline-block;
  width: 20px;
}
</style>
</head>
<body>
<p>Each grouping below should have two boxes with matching outlines.</p> 
<div class="group">
  <div class="outer">
    <div class="container" style="outline-width: 5px;">
    </div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container" style="outline-width: 5px;">
    </div>
  </div>
</div>
<div class="group">
  <div class="outer">
    <div class="container-zoomed" style="outline-width: 10px;">
    </div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container-zoomed" style="outline-width: 10px;">
    </div>
  </div>
</div>
</body>
</html>
