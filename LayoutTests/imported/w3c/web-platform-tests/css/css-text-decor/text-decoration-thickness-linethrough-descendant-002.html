<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>text-decoration: line-through thickness ignores a descendant's own text-decoration-thickness</title>
    <link rel="help" href="https://drafts.csswg.org/css-text-decor-4/#text-decoration-width-property">
    <link rel="match" href="text-decoration-thickness-linethrough-descendant-002-ref.html">
    <link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
    <meta name="assert" content="The ancestor's line-through uses the ancestor's text-decoration-thickness over a descendant inline box even when that descendant sets a different (smaller) text-decoration-thickness of its own.">
    <style>
        div {
            overflow: hidden;
            height: 1em;
            width: 4em;
            background-color: red;
            font: 20px/1 Ahem;
            color: transparent;
            text-decoration: green line-through;
            text-decoration-skip-ink: none;
            text-decoration-thickness: 2em;
        }
        /* The span sets a thin thickness but no line of its own: it must not affect the inherited line-through. */
        span {
            text-decoration-thickness: 1px;
        }
    </style>
</head>
<body>
    <p>Test passes if there is a wide green block, fails if there is any red visible</p>
    <div>X<span>XX</span>X</div>
</body>
</html>
