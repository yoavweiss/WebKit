<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>text-decoration: an ancestor line-through is painted over a descendant that has its own line-through</title>
    <link rel="help" href="https://drafts.csswg.org/css-text-decor-4/#text-decoration-width-property">
    <link rel="match" href="text-decoration-thickness-linethrough-descendant-004-ref.html">
    <link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
    <meta name="assert" content="When a descendant inline box has its own thin line-through, the ancestor's thicker line-through is still painted over it, so the ancestor thickness covers the content-box.">
    <style>
        div {
            overflow: hidden;
            height: 1em;
            width: 4em;
            background-color: red;
            font: 20px/1 Ahem;
            color: transparent;
            text-decoration: green line-through;
            text-decoration-skip-ink: none;
            text-decoration-thickness: 2em;
        }
        /* The span establishes its own thin line-through; the div's thick one must still be painted over it. */
        span {
            text-decoration: green line-through;
            text-decoration-thickness: 1px;
        }
    </style>
</head>
<body>
    <p>Test passes if there is a wide green block, fails if there is any red visible</p>
    <div>X<span>XX</span>X</div>
</body>
</html>
