<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reference: overline thickness on a descendant block</title>
    <link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
    <style>
        div { font: 20px/1 Ahem; }
        /* Same 10px overline, applied directly to the inner block (not propagated). */
        #inner { text-decoration: green overline; text-decoration-thickness: 10px; }
    </style>
</head>
<body>
    <div><div id="inner">X</div></div>
</body>
</html>
