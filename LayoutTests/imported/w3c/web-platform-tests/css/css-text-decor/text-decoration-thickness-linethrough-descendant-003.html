<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>text-decoration: line-through thickness applies through nested inline boxes</title>
    <link rel="help" href="https://drafts.csswg.org/css-text-decor-4/#text-decoration-width-property">
    <link rel="match" href="text-decoration-thickness-linethrough-descendant-003-ref.html">
    <link rel="stylesheet" type="text/css" href="/fonts/ahem.css">
    <meta name="assert" content="A line-through set on an ancestor is painted at the ancestor's text-decoration-thickness over text nested several inline boxes deep.">
    <style>
        div {
            overflow: hidden;
            height: 1em;
            width: 4em;
            background-color: red;
            font: 20px/1 Ahem;
            color: transparent;
            text-decoration: green line-through;
            text-decoration-skip-ink: none;
            text-decoration-thickness: 2em;
        }
    </style>
</head>
<body>
    <p>Test passes if there is a wide green block, fails if there is any red visible</p>
    <div>X<span><span>XX</span></span>X</div>
</body>
</html>
