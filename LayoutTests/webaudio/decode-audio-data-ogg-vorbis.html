<!DOCTYPE html>
<html>
<head>
<script src="../resources/js-test.js"></script>
<script type="text/javascript" src="resources/audio-testing.js"></script>
</head>
<body>
<script>
description("Test that decoding a vorbis ogg file succeeds");

window.jsTestIsAsync = true;

var context = new window.AudioContext({ sampleRate: 44100 });
var request = new XMLHttpRequest();
request.open("GET", 'resources/media/vbr-96kbps-44khz.ogg', true);
request.responseType = "arraybuffer";

request.onload = function() {
    context.decodeAudioData(request.response, (buffer) => {
        testPassed("Successfully decoded content");
        // File is exactly 1s long @ 44100Hz, no resampling, so 44100 frames.
        if (buffer.length === 44100)
          testPassed("Decoding returned the right number of frames.");
        else
          testFailed("Decoding returned the wrong number of frames: " + buffer.length);
        finishJSTest();
      }, () => {
        testFailed("Failed to decode file");
        finishJSTest();
      });
}
request.send();

</script>
</body>
</html>
