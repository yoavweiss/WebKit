<!DOCTYPE html>
<title>-webkit-fill-available on block-level replaced element does not shrink for floats</title>
<link rel="match" href="replaced-width-fill-available-ignores-float-expected.html">
<style>
.container {
  width: 200px;
}
.float {
  float: left;
  width: 60px;
  height: 50px;
  background: blue;
}
canvas {
  display: block;
  width: -webkit-fill-available;
  height: 50px;
  background: green;
}
</style>
<div class="container">
  <div class="float"></div>
  <canvas></canvas>
</div>
