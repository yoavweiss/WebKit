<html>
<body>
<script>
// This test does not use the js-test framework: it deliberately replaces the
// whole document with document.open()/write()/close(), which would destroy the
// js-test console and DOM state. The only observable output is the "PASS" text
// written below; completion is driven directly via testRunner.notifyDone().
if (window.testRunner) {
    testRunner.dumpAsText();
    testRunner.waitUntilDone();
}

function runTest()
{
    root = document.getElementById('root').contentDocument;
    test = root.getElementById('test');
    var doc = document.implementation.createDocument(null, "test");
    doc.adoptNode(test);
    test.appendChild(root.getElementById('svg').cloneNode(0));
    document.open();
    document.write('PASS');
    document.close();
    setTimeout('finish();', 0);
}

function finish()
{
    gc();
    document.adoptNode(test);
    if (window.testRunner)
        testRunner.notifyDone();
}

function gc()
{
    if (window.GCController)
        return GCController.collect();

    for (var i = 0; i < 10000; i++)
        var s = new String("abc");
}
</script>
<object data="resources/node-move-to-new-document-crash.svg" id="root" onload="runTest()"/></object>
</body>
</html>
