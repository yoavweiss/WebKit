<style>

ul {
    margin: 0;
    padding-inline-start: 40px;
    width: 200px;
}

.zoom {
    zoom: 2;
}

</style>

<div>
    <ul>
        <li>This is a long list item that wraps to multiple lines at this width</li>
    </ul>
</div>

<div>
    <ul class="zoom">
        <li>This is a long list item that wraps to multiple lines at this width</li>
    </ul>
</div>
