<!DOCTYPE html>
<style>

body {
    --scale: 1;
}

ul {
    margin: 0;
    font-size: calc(1rem * var(--scale));
    padding-inline-start: calc(40px * var(--scale));
    width: calc(200px * var(--scale));
}

.zoom {
    --scale: 2;
}

</style>

<div>
    <ul>
        <li>This is a long list item that wraps to multiple lines at this width</li>
    </ul>
</div>

<div>
    <ul class="zoom">
        <li>This is a long list item that wraps to multiple lines at this width</li>
    </ul>
</div>
