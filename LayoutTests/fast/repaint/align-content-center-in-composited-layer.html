<!DOCTYPE html>
<title>Content change inside a composited box that align-content centered must repaint in the right place. https://bugs.webkit.org/show_bug.cgi?id=316820</title>
<script src="../../resources/ui-helper.js"></script>
<style>
.center {
  align-content: center;
  height: 100px;
  font-family: Ahem;
}
.repaint-container {
  transform: translateZ(0);
}
</style>
<div class=center>
    <div class=repaint-container>
      <div id=target>F</div>
    </div>
</div>
<script>
window.testRunner?.waitUntilDone();
window.testRunner?.dontForceRepaint();

async function runTest() {
    await UIHelper.renderingUpdate();
    target.innerHTML = "PASS";
    await UIHelper.renderingUpdate();
    await UIHelper.renderingUpdate();
    window.testRunner?.notifyDone();
}

window.addEventListener('load', runTest);
</script>
