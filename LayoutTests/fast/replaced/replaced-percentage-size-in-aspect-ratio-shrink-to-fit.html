<!DOCTYPE html>
<meta charset="utf-8">
<title>Replaced element with percentage size keeps its intrinsic width in a shrink-to-fit aspect-ratio box</title>
<style>
button {
  appearance: none;
  aspect-ratio: 1;
  padding: 10px;
  border: none;
  background-color: green;
  vertical-align: top;
}
svg {
  width: 100%;
  height: 100%;
}
</style>

<p>Test passes if there is a filled green square below.</p>
<button><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"></svg></button>
