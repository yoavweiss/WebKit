<!doctype html>

<head>
    <meta charset="utf-8">
    <title>Photo Gallery</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="select.css">
    <link rel="stylesheet" href="color-select.css">
    <link rel="stylesheet" href="category-select.css">
    <meta name="color-scheme" content="dark light">
</head>
<body>
    <header>
        <div class="spacer"></div>
        <span class="header-brand">
            <img src="icons/camera.svg" role="none">
            Tim’s photo gallery
        </span>
        <div class="spacer"></div>
    </header>
    <aside>
        <div class="spacer"></div>

        <div class="control-group">
            <span class="select-label">Sort by</span>
            <select id="sort-select">
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
            </select>
        </div>

        <div class="control-group">
            <span class="select-label">Category</span>
            <select id="category-select">
                <button>
                    <selectedcontent></selectedcontent>
                </button>
                <option value="everything">
                    <img src="icons/all.svg" alt="">
                    <span class="text">Everything</span>
                </option>
                <option value="buildings">
                    <img src="icons/buildings.svg" alt="">
                    <span class="text">Buildings</span>
                </option>
                <option value="flowers">
                    <img src="icons/flower.svg" alt="">
                    <span class="text">Flowers</span>
                </option>
                <option value="landscapes">
                    <img src="icons/landscapes.svg" alt="">
                    <span class="text">Landscapes</span>
                </option>
                <option value="objects">
                    <img src="icons/furniture.svg" alt="">
                    <span class="text">Objects</span>
                </option>
                <option value="wildlife">
                    <img src="icons/bird.svg" alt="">
                    <span class="text">Wildlife</span>
                </option>
            </select>
        </div>

        <div class="control-group">
            <span class="select-label">Color</span>
            <select id="color-select">
                <button><selectedcontent></selectedcontent></button>
                <div>
                    <option value="all">
                        <div class="swatch all"></div>
                        <span>All</span>
                    </option>
                    <option value="skyblue" title="Blue">
                        <div class="swatch" style="background-color: skyblue;"></div>
                        <span>Blue</span>
                    </option>
                    <option value="navy" title="Navy">
                        <div class="swatch" style="background-color: navy;"></div>
                        <span>Navy</span>
                    </option>
                    <option value="forestgreen" title="Green">
                        <div class="swatch" style="background-color: forestgreen;"></div>
                        <span>Green</span>
                    </option>
                    <option value="orange" title="Orange">
                        <div class="swatch" style="background-color: orange;"></div>
                        <span>Orange</span>
                    </option>
                    <option value="sienna" title="Brown">
                        <div class="swatch" style="background-color: sienna;"></div>
                        <span>Brown</span>
                    </option>
                    <option value="purple" title="Purple">
                        <div class="swatch" style="background-color: purple;"></div>
                        <span>Purple</span>
                    </option>
                    <option value="pink" title="Pink">
                        <div class="swatch" style="background-color: pink;"></div>
                        <span>Pink</span>
                    </option>
                </div>
            </select>
        </div>
        <div class="spacer"></div>
    </aside>
